name = "proudone-api"
main = "src/worker.js"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "proudone-db"
database_id = "a2748fff-ea16-4138-a44a-af0f755c18c9"
# After running: npx wrangler d1 create proudone-db
# Copy the database_id from the output and paste it above

[vars]
CORS_ORIGIN = "*"
# Change to your actual domain in production, e.g. "https://proudone.pages.dev"

[ai]
binding = "AI"
